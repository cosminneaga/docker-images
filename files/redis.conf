# Bind only to localhost inside the container (you can adjust if needed)
bind 0.0.0.0

# Require a password
requirepass password

# Set max memory usage (example: 256MB) and eviction policy
maxmemory 256mb
maxmemory-policy allkeys-lru

# Enable persistence (RDB snapshotting)
save 900 1
save 300 10
save 60 10000

# Append-only file persistence
appendonly yes