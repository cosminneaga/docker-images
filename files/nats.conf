server_name: "nats_server"
port: 4222
monitor_port: 8222
debug: true

jetstream {
  store_dir: "/tmp/nats/jetstream"
  max_mem_store: 1Gb
  max_file_store: 10Gb
}

# tls {
#   cert_file: "/certs/server-cert.pem"
#   key_file: "/certs/server-key.pem"
#   ca_file: "/certs/ca.pem"
# }

websocket {
  listen: 0.0.0.0:9222
  compression: true
  handshake_timeout: 5
  no_tls: true
